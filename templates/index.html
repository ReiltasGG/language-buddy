<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Buddy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo { font-size: 20px; font-weight: 700; color: #fff; }
        .logo span { color: #7c6af7; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

        select {
            background: #2a2a2a; color: #e8e8e8;
            border: 1px solid #3a3a3a; border-radius: 8px;
            padding: 8px 12px; font-size: 14px; cursor: pointer; outline: none;
        }

        select:hover { border-color: #7c6af7; }

        .mode-tabs {
            display: flex; background: #2a2a2a;
            border-radius: 8px; padding: 3px; gap: 2px;
        }

        .mode-tab {
            padding: 6px 14px; border-radius: 6px; font-size: 13px;
            cursor: pointer; border: none; background: none; color: #888; transition: all 0.2s;
        }

        .mode-tab.active { background: #7c6af7; color: #fff; }
        .mode-tab:hover:not(.active) { color: #e8e8e8; }

        .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

        /* chat */
        .chat-view {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
        }

        .welcome { text-align: center; padding: 40px 20px; color: #555; }
        .welcome h2 { font-size: 24px; color: #888; margin-bottom: 8px; }
        .welcome p { font-size: 14px; }

        .message { display: flex; gap: 12px; max-width: 800px; }
        .message.user { flex-direction: row-reverse; align-self: flex-end; }
        .message.assistant { align-self: flex-start; }

        .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }

        .message.user .avatar { background: #7c6af7; }
        .message.assistant .avatar { background: #2a2a2a; }

        .bubble {
            padding: 12px 16px; border-radius: 16px; font-size: 14px;
            line-height: 1.6; max-width: 600px; white-space: pre-wrap;
        }

        .message.user .bubble { background: #7c6af7; color: #fff; border-bottom-right-radius: 4px; }
        .message.assistant .bubble { background: #1e1e1e; color: #e8e8e8; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; }

        .notes-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #2a2a2a; color: #aaa; font-size: 13px; }

        .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 16px; }

        .dot { width: 8px; height: 8px; background: #555; border-radius: 50%; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* flashcard view */
        .flashcard-view {
            flex: 1; display: none; flex-direction: column;
            align-items: center; justify-content: center; padding: 24px; gap: 24px;
        }

        .flashcard-view.active { display: flex; }

        .category-picker { display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .category-picker h2 { font-size: 20px; color: #888; }

        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

        .category-btn {
            background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 12px;
            color: #e8e8e8; padding: 20px 32px; font-size: 16px; cursor: pointer;
            transition: all 0.2s; text-align: center;
        }

        .category-btn:hover { border-color: #7c6af7; background: #2a2a2a; }
        .category-btn .emoji { font-size: 28px; display: block; margin-bottom: 8px; }

        /* loading screen */
        .loading-screen {
            display: none; flex-direction: column;
            align-items: center; gap: 16px; color: #888;
        }

        .loading-screen.active { display: flex; }
        .loading-screen p { font-size: 14px; }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #2a2a2a;
            border-top-color: #7c6af7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .card-area {
            display: none; flex-direction: column;
            align-items: center; gap: 20px; width: 100%; max-width: 500px;
        }

        .card-area.active { display: flex; }

        .score-bar { display: flex; gap: 16px; font-size: 14px; color: #888; }
        .score-bar .correct { color: #4ade80; }
        .score-bar .incorrect { color: #f87171; }

        .card-scene { width: 100%; height: 220px; perspective: 1000px; cursor: pointer; }

        .card-inner {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.5s;
        }

        .card-inner.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 16px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px; border: 1px solid #2a2a2a;
        }

        .card-front { background: #1e1e1e; }
        .card-back { background: #1e1e1e; transform: rotateY(180deg); }

        .card-japanese { font-size: 52px; margin-bottom: 8px; }
        .card-furigana { font-size: 18px; color: #7c6af7; margin-bottom: 4px; min-height: 24px; }
        .card-hint { font-size: 12px; color: #555; margin-top: 12px; }
        .card-english { font-size: 28px; font-weight: 600; color: #e8e8e8; text-align: center; }
        .card-category-label { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

        .card-actions { display: flex; gap: 12px; width: 100%; }

        .card-btn {
            flex: 1; padding: 12px; border-radius: 10px; border: none;
            font-size: 15px; cursor: pointer; font-weight: 600; transition: all 0.2s;
        }

        .card-btn.wrong { background: #3a1a1a; color: #f87171; border: 1px solid #5a2a2a; }
        .card-btn.wrong:hover { background: #4a2020; }
        .card-btn.right { background: #1a3a1a; color: #4ade80; border: 1px solid #2a5a2a; }
        .card-btn.right:hover { background: #204a20; }
        .card-btn.flip-btn { background: #7c6af7; color: #fff; border: none; }
        .card-btn.flip-btn:hover { background: #6a58e0; }

        .back-btn { background: none; border: none; color: #555; font-size: 13px; cursor: pointer; padding: 4px 8px; }
        .back-btn:hover { color: #888; }

        .progress-bar { width: 100%; height: 4px; background: #2a2a2a; border-radius: 2px; }
        .progress-fill { height: 100%; background: #7c6af7; border-radius: 2px; transition: width 0.3s; }

        .done-screen { display: none; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
        .done-screen.active { display: flex; }
        .done-screen h2 { font-size: 24px; }
        .done-screen p { color: #888; font-size: 14px; }

        .restart-btn {
            background: #7c6af7; border: none; border-radius: 10px;
            color: #fff; padding: 12px 28px; font-size: 15px; cursor: pointer; margin-top: 8px;
        }

        .restart-btn:hover { background: #6a58e0; }

        /* input */
        .input-area {
            background: #1a1a1a; border-top: 1px solid #2a2a2a;
            padding: 16px 24px; display: flex; gap: 10px; align-items: flex-end;
        }

        .input-area.hidden { display: none; }

        textarea {
            flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a;
            border-radius: 12px; color: #e8e8e8; font-size: 14px;
            padding: 12px 16px; resize: none; outline: none;
            font-family: inherit; line-height: 1.5; max-height: 120px; min-height: 44px;
        }

        textarea:focus { border-color: #7c6af7; }
        textarea::placeholder { color: #555; }

        .send-btn {
            background: #7c6af7; border: none; border-radius: 12px; color: #fff;
            width: 44px; height: 44px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 18px;
            flex-shrink: 0; transition: background 0.2s;
        }

        .send-btn:hover { background: #6a58e0; }
        .send-btn:disabled { background: #333; cursor: not-allowed; }

        .clear-btn {
            background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 12px;
            color: #888; padding: 0 14px; height: 44px; cursor: pointer;
            font-size: 13px; transition: all 0.2s;
        }

        .clear-btn:hover { border-color: #555; color: #e8e8e8; }

        .chat-view::-webkit-scrollbar { width: 6px; }
        .chat-view::-webkit-scrollbar-track { background: transparent; }
        .chat-view::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Language<span>Buddy</span></div>
    <div class="controls">
        <select id="language-select" onchange="onLanguageChange()">
            <option value="Japanese">🇯🇵 Japanese</option>
            <option value="Spanish">🇪🇸 Spanish</option>
            <option value="French">🇫🇷 French</option>
            <option value="Mandarin">🇨🇳 Mandarin</option>
            <option value="Italian">🇮🇹 Italian</option>
            <option value="Portuguese">🇧🇷 Portuguese</option>
            <option value="German">🇩🇪 German</option>
            <option value="Korean">🇰🇷 Korean</option>
        </select>
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="conversation">💬 Conversation</button>
            <button class="mode-tab" data-mode="flashcard">🃏 Flashcards</button>
        </div>
    </div>
</header>

<div class="main">

    <div class="chat-view" id="chat-view">
        <div class="welcome" id="welcome">
            <h2>こんにちは! 👋</h2>
            <p>Select a language above and start chatting to practice!</p>
        </div>
    </div>

    <div class="flashcard-view" id="flashcard-view">

        <div class="category-picker" id="category-picker">
            <h2>Choose a category to practice</h2>
            <div class="category-grid" id="category-grid"></div>
        </div>

        <div class="loading-screen" id="loading-screen">
            <div class="spinner"></div>
            <p id="loading-text">Generating flashcards...</p>
        </div>

        <div class="card-area" id="card-area">
            <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                <button class="back-btn" onclick="showCategoryPicker()">← Back</button>
                <div class="score-bar">
                    <span>Card <span id="card-num">1</span>/<span id="card-total">10</span></span>
                    <span class="correct">✓ <span id="score-correct">0</span></span>
                    <span class="incorrect">✗ <span id="score-incorrect">0</span></span>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>

            <div class="card-scene" onclick="flipCard()">
                <div class="card-inner" id="card-inner">
                    <div class="card-front">
                        <div class="card-category-label" id="card-category-label"></div>
                        <div class="card-furigana" id="card-furigana"></div>
                        <div class="card-japanese" id="card-japanese"></div>
                        <div class="card-hint">tap to reveal</div>
                    </div>
                    <div class="card-back">
                        <div class="card-category-label">English</div>
                        <div class="card-english" id="card-english"></div>
                    </div>
                </div>
            </div>

            <div id="flip-actions">
                <button class="card-btn flip-btn" onclick="flipCard()" style="width:100%;">Reveal Answer</button>
            </div>

            <div class="card-actions" id="answer-actions" style="display:none;">
                <button class="card-btn wrong" onclick="markAnswer(false)">✗ Incorrect</button>
                <button class="card-btn right" onclick="markAnswer(true)">✓ Correct</button>
            </div>
        </div>

        <div class="done-screen" id="done-screen">
            <div style="font-size:48px;">🎉</div>
            <h2>Session Complete!</h2>
            <p id="done-score"></p>
            <button class="restart-btn" onclick="showCategoryPicker()">Practice Again</button>
        </div>

    </div>

</div>

<div class="input-area" id="input-area">
    <button class="clear-btn" onclick="clearChat()">Clear</button>
    <textarea
        id="input"
        placeholder="Type a message..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
    let history = [];
    let currentMode = "conversation";
    let isLoading = false;
    let cards = [];
    let cardIndex = 0;
    let scoreCorrect = 0;
    let scoreIncorrect = 0;
    let isFlipped = false;

    // languages that have a script category and what to call it
    const scriptCategory = {
        Japanese: { key: "kanji", label: "Kanji", emoji: "漢" },
        Korean:   { key: "hangul", label: "Hangul", emoji: "한" },
        Mandarin: { key: "hanzi", label: "Hanzi", emoji: "汉" },
    };

    // base categories for all languages
    const baseCategories = [
        { key: "verbs",  label: "Verbs",          emoji: "🏃" },
        { key: "places", label: "Places & Names",  emoji: "🗺️" },
        { key: "nouns",  label: "Common Nouns",    emoji: "📦" },
    ];

    function buildCategoryGrid() {
        const lang = getLanguage();
        const grid = document.getElementById("category-grid");
        grid.innerHTML = "";

        const cats = [...baseCategories];
        if (scriptCategory[lang]) cats.push(scriptCategory[lang]);

        cats.forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "category-btn";
            btn.innerHTML = `<span class="emoji">${cat.emoji}</span>${cat.label}`;
            btn.onclick = () => startFlashcards(cat.key);
            grid.appendChild(btn);
        });
    }

    function onLanguageChange() {
        clearChat();
        if (currentMode === "flashcard") {
            buildCategoryGrid();
            showCategoryPicker();
        }
    }

    document.querySelectorAll(".mode-tab").forEach(tab => {
        tab.addEventListener("click", () => {
            document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            currentMode = tab.dataset.mode;
            switchMode(currentMode);
        });
    });

    function switchMode(mode) {
        const chatView = document.getElementById("chat-view");
        const flashcardView = document.getElementById("flashcard-view");
        const inputArea = document.getElementById("input-area");

        if (mode === "flashcard") {
            chatView.style.display = "none";
            flashcardView.classList.add("active");
            inputArea.classList.add("hidden");
            buildCategoryGrid();
            showCategoryPicker();
        } else {
            chatView.style.display = "flex";
            flashcardView.classList.remove("active");
            inputArea.classList.remove("hidden");
            clearChat();
        }
    }

    async function startFlashcards(category) {
        // show loading
        document.getElementById("category-picker").style.display = "none";
        document.getElementById("card-area").classList.remove("active");
        document.getElementById("done-screen").classList.remove("active");
        document.getElementById("loading-screen").classList.add("active");
        document.getElementById("loading-text").textContent =
            `Generating ${category} flashcards in ${getLanguage()}...`;

        try {
            const resp = await fetch("/flashcards", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ language: getLanguage(), category })
            });

            const data = await resp.json();

            if (data.error || !data.cards.length) {
                document.getElementById("loading-screen").classList.remove("active");
                showCategoryPicker();
                alert("Could not generate flashcards. Make sure Ollama is running.");
                return;
            }

            cards = data.cards;
            cardIndex = 0;
            scoreCorrect = 0;
            scoreIncorrect = 0;

            document.getElementById("loading-screen").classList.remove("active");
            document.getElementById("card-area").classList.add("active");
            document.getElementById("card-total").textContent = cards.length;

            showCard();

        } catch (err) {
            document.getElementById("loading-screen").classList.remove("active");
            showCategoryPicker();
            alert("Could not connect. Make sure Flask and Ollama are running.");
        }
    }

    function showCard() {
        if (cardIndex >= cards.length) { showDoneScreen(); return; }

        const card = cards[cardIndex];
        isFlipped = false;

        document.getElementById("card-inner").classList.remove("flipped");
        document.getElementById("card-japanese").textContent = card.japanese || card.display || "";
        document.getElementById("card-furigana").textContent = card.furigana || "";
        document.getElementById("card-english").textContent = card.english;
        document.getElementById("card-num").textContent = cardIndex + 1;
        document.getElementById("score-correct").textContent = scoreCorrect;
        document.getElementById("score-incorrect").textContent = scoreIncorrect;
        document.getElementById("card-category-label").textContent = getLanguage();

        const pct = (cardIndex / cards.length) * 100;
        document.getElementById("progress-fill").style.width = pct + "%";

        document.getElementById("flip-actions").style.display = "block";
        document.getElementById("answer-actions").style.display = "none";
    }

    function flipCard() {
        if (isFlipped) return;
        isFlipped = true;
        document.getElementById("card-inner").classList.add("flipped");
        document.getElementById("flip-actions").style.display = "none";
        document.getElementById("answer-actions").style.display = "flex";
    }

    function markAnswer(correct) {
        if (correct) scoreCorrect++;
        else scoreIncorrect++;
        cardIndex++;
        showCard();
    }

    function showDoneScreen() {
        document.getElementById("card-area").classList.remove("active");
        const done = document.getElementById("done-screen");
        done.classList.add("active");
        const total = scoreCorrect + scoreIncorrect;
        const pct = total > 0 ? Math.round((scoreCorrect / total) * 100) : 0;
        document.getElementById("done-score").textContent =
            `${scoreCorrect} correct out of ${total} cards (${pct}%)`;
    }

    function showCategoryPicker() {
        document.getElementById("card-area").classList.remove("active");
        document.getElementById("done-screen").classList.remove("active");
        document.getElementById("loading-screen").classList.remove("active");
        document.getElementById("category-picker").style.display = "flex";
    }

    function clearChat() {
        history = [];
        const chat = document.getElementById("chat-view");
        chat.innerHTML = `
            <div class="welcome" id="welcome">
                <h2>Ready to practice ${getLanguageEmoji()} ${getLanguage()}!</h2>
                <p>Start typing below to begin your conversation!</p>
            </div>`;
    }

    function getLanguage() {
        return document.getElementById("language-select").value;
    }

    function getLanguageEmoji() {
        const emojis = {
            Japanese: "🇯🇵", Spanish: "🇪🇸", French: "🇫🇷",
            Mandarin: "🇨🇳", Italian: "🇮🇹", Portuguese: "🇧🇷",
            German: "🇩🇪", Korean: "🇰🇷"
        };
        return emojis[getLanguage()] || "🌍";
    }

    function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function addMessage(role, content) {
        const welcome = document.getElementById("welcome");
        if (welcome) welcome.remove();

        const chat = document.getElementById("chat-view");
        const div = document.createElement("div");
        div.className = `message ${role}`;

        let bubbleContent = content;
        if (role === "assistant" && content.includes("📝 Notes:")) {
            const parts = content.split("📝 Notes:");
            bubbleContent = `${parts[0]}<div class="notes-section">📝 Notes:${parts[1]}</div>`;
        }

        div.innerHTML = `
            <div class="avatar">${role === "user" ? "🧑" : "🤖"}</div>
            <div class="bubble">${bubbleContent}</div>`;

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function addTyping() {
        const chat = document.getElementById("chat-view");
        const div = document.createElement("div");
        div.className = "message assistant typing";
        div.id = "typing";
        div.innerHTML = `
            <div class="avatar">🤖</div>
            <div class="bubble">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    async function sendMessage() {
        const input = document.getElementById("input");
        const message = input.value.trim();
        if (!message || isLoading) return;

        isLoading = true;
        document.getElementById("send-btn").disabled = true;
        input.value = "";
        input.style.height = "auto";

        addMessage("user", message);
        history.push({ role: "user", content: message });
        addTyping();

        try {
            const resp = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message,
                    language: getLanguage(),
                    history: history.slice(-4)
                })
            });

            const data = await resp.json();
            removeTyping();

            if (data.error) {
                addMessage("assistant", `⚠️ Error: ${data.error}. Make sure Ollama is running.`);
            } else {
                addMessage("assistant", data.reply);
                history.push({ role: "assistant", content: data.reply });
            }
        } catch (err) {
            removeTyping();
            addMessage("assistant", "⚠️ Could not connect. Make sure Flask and Ollama are running.");
        }

        isLoading = false;
        document.getElementById("send-btn").disabled = false;
        input.focus();
    }
</script>

</body>
</html>
